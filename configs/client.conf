# MOOR Client Configuration
#
# Routes your traffic through 3 encrypted hops.
# Starts a SOCKS5 proxy on localhost.
#
# Run: moor -f client.conf
#
# Configure your browser or apps:
#   SOCKS5 proxy: 127.0.0.1:9050
#   IMPORTANT: Use socks5h:// (with the h) so DNS goes through the network too.
#
# Test: curl -x socks5h://127.0.0.1:9050 http://example.com
#
# Firefox: Settings > Network Settings > Manual proxy
#   SOCKS Host: 127.0.0.1    Port: 9050    SOCKS v5
#   Check "Proxy DNS when using SOCKS v5"
#
# Chromium/Brave: chromium --proxy-server="socks5://127.0.0.1:9050" # (Chromium proxies DNS through SOCKS5 automatically)

# ---- Core ----
Mode client
SocksPort 9050
BindAddress 127.0.0.1

# Persistent state (guard selection, consensus cache)
#DataDirectory ~/.moor

# ---- Directory Authorities ----
DAAddress 107.174.70.38
DAPort 9030

# ---- Privacy ----
# PIR for hidden service lookups (default: on)
# Prevents directory relays from learning which .moor address you visit
PIR 1

# Preferred entry node (64-char hex fingerprint of a specific guard)
#EntryNode abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789

# ---- Traffic Analysis Resistance ----
# Padding machine: generic (default), web, stream, none
#PaddingMachine generic

# Multi-path circuits (splits traffic across multiple paths)
#Conflux 0
#ConfluxLegs 2

# ---- Bridges (for censored networks) ----
# If direct connections to relays are blocked, connect via a bridge.
# Get bridge lines from a trusted source.
#UseBridges 0
#Bridge scramble 1.2.3.4:443 abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789
#Bridge shade 5.6.7.8:8080 abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789
#Bridge mirage 9.10.11.12:443 abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789

# ---- Transparent Proxy (advanced) ----
# Redirect all TCP/DNS without configuring SOCKS per-application.
# Requires iptables rules -- see https://moor.afflicted.sh/docs.html
#TransPort 9040
#TransListenAddress 127.0.0.1
#DNSPort 5353
#DNSListenAddress 127.0.0.1
#AutomapHostsOnResolve 1

# ---- IPv6 ----
#ClientUseIPv6 0
#ClientPreferIPv6ORPort 0

# ---- Monitoring ----
#ControlPort 9051
#ControlPortPassword mypassword

# ---- Enclave (independent network) ----
# Load DAs from enclave file instead of defaults
#Enclave /path/to/mynetwork.enclave

# ---- System ----
#Verbose 0
#Daemon 0
#PidFile /var/run/moor.pid

# GeoIP databases (for path diversity -- avoids same country in circuit)
#GeoIPFile /usr/share/moor/geoip
#GeoIPv6File /usr/share/moor/geoip6
