# MOOR Bridge Relay Configuration
#
# A bridge is an unlisted relay for users in censored environments.
# It is NOT in the public consensus -- censors cannot discover it.
# Combined with a pluggable transport, bridge traffic looks like
# normal Chrome HTTPS, SSH, or other protocols.
#
# 1. Change AdvertiseAddress to your public IP
# 2. Change Nickname to something unique
# 3. Choose a transport (shitstorm recommended)
# 4. Run: moor -f bridge.conf
# 5. Share the bridge line (printed on startup) with users who need it

# ---- Core ----
Mode relay
BindAddress 0.0.0.0
ORPort 9001
AdvertiseAddress YOUR_PUBLIC_IP
IsBridge 1
Nickname MyBridge
DataDirectory /var/lib/moor
Verbose 1

# ---- Transport ----
# shitstorm  - Chrome TLS 1.3 fingerprint (hardest to block)
# mirage     - TLS 1.3 record framing
# shade      - Elligator2 statistical evasion
# scramble   - Entropy evasion with HTTP prefix
# speakeasy  - SSH protocol camouflage
BridgeTransport shitstorm

# ---- Network ----
DAAddress 107.174.70.38
DAPort 9030

# ---- Enclave (independent network) ----
# Load DAs from enclave file instead of defaults
#Enclave /path/to/mynetwork.enclave

# ---- Bandwidth ----
#BandwidthRate 10000000

# ---- System ----
#Daemon 0
#PidFile /var/run/moor.pid
