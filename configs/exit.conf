# MOOR Exit Relay Configuration
#
# An exit relay is the last hop -- it connects to websites on behalf of users.
# It sees destination addresses but NOT who is requesting them.
#
# WARNING: Traffic appears to come from YOUR IP address.
# You will receive abuse complaints. Use a VPS with an abuse-friendly provider.
#
# 1. Change AdvertiseAddress to your public IP
# 2. Change Nickname to something unique
# 3. Set your ContactInfo (strongly recommended for exit operators)
# 4. Choose an exit policy (default or reduced -- see below)
# 5. Run: moor -f exit.conf

# ---- Core ----
Mode relay
BindAddress 0.0.0.0
ORPort 9001
AdvertiseAddress YOUR_PUBLIC_IP
Exit 1
Nickname MyExit
DataDirectory /var/lib/moor
Verbose 1

# ---- Identity ----
# Contact info (STRONGLY recommended for exit operators)
ContactInfo you@example.com

# Declare sibling relays you also operate (64-char hex fingerprint)
#RelayFamily abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789

# ---- Network ----
# Directory authorities (default MOOR network)
DAAddress 107.174.70.38
DAPort 9030

# ---- Exit Policy ----
# Rules evaluated in order. First match wins.
#
# DEFAULT POLICY: blocks commonly abused ports, allows everything else.
# Uncomment ONE policy section below.

# --- Option 1: Default exit policy (most useful, more abuse complaints) ---
ExitPolicy reject *:25        # SMTP (spam)
ExitPolicy reject *:119       # NNTP
ExitPolicy reject *:135-139   # Windows RPC/NetBIOS
ExitPolicy reject *:445       # SMB
ExitPolicy reject *:563       # NNTP over TLS
ExitPolicy reject *:1214      # Kazaa
ExitPolicy reject *:4661-4666 # eDonkey
ExitPolicy reject *:6346-6429 # Gnutella
ExitPolicy reject *:6881-6999 # BitTorrent
ExitPolicy accept *:*         # Allow everything else

# --- Option 2: Reduced exit policy (web-only, fewer complaints) ---
# Uncomment these and comment out Option 1 above for a safer exit.
#ExitPolicy accept *:20-21     # FTP
#ExitPolicy accept *:22        # SSH
#ExitPolicy accept *:43        # WHOIS
#ExitPolicy accept *:53        # DNS
#ExitPolicy accept *:80        # HTTP
#ExitPolicy accept *:110       # POP3
#ExitPolicy accept *:143       # IMAP
#ExitPolicy accept *:443       # HTTPS
#ExitPolicy accept *:465       # SMTPS
#ExitPolicy accept *:587       # SMTP submission
#ExitPolicy accept *:993       # IMAPS
#ExitPolicy accept *:995       # POP3S
#ExitPolicy accept *:1194      # OpenVPN
#ExitPolicy accept *:5222-5223 # XMPP
#ExitPolicy accept *:8080      # HTTP alt
#ExitPolicy accept *:8443      # HTTPS alt
#ExitPolicy accept *:9418      # Git
#ExitPolicy reject *:*         # Reject everything else

# ---- Bandwidth ----
# Default: 1000000 bytes/s. Uncomment to override.
#BandwidthRate 10000000  # bytes/s

# Traffic cap. Relay hibernates when reached. Period is in seconds.
#AccountingMax 0  # bytes (0 = unlimited)
#AccountingPeriod 2592000  # 30 days

# ---- Traffic Analysis Resistance ----
# Padding machine: generic (default), web, stream, none
#PaddingMachine generic

# Poisson mixing delay in ms (adds random delay to forwarded cells)
#MixDelay 0

# ---- Monitoring ----
# Tor-compatible control port
#ControlPort 9051
#ControlPortPassword mypassword

# Runtime statistics logging
#Monitor 0

# ---- Enclave (independent network) ----
# Load DAs from enclave file instead of defaults
#Enclave /path/to/mynetwork.enclave

# ---- System ----
# Run as daemon
#Daemon 0
#PidFile /var/run/moor.pid

# GeoIP databases (auto-detected from standard paths)
#GeoIPFile /usr/share/moor/geoip
#GeoIPv6File /usr/share/moor/geoip6
