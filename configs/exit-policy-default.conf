# MOOR Default Exit Policy
#
# Blocks commonly abused ports, allows everything else.
# This is what most exit relays run.
#
# Copy these lines into your exit relay config file.

ExitPolicy reject *:25        # SMTP (spam relay)
ExitPolicy reject *:119       # NNTP (usenet)
ExitPolicy reject *:135-139   # Windows RPC / NetBIOS
ExitPolicy reject *:445       # SMB (file sharing)
ExitPolicy reject *:563       # NNTP over TLS
ExitPolicy reject *:1214      # Kazaa
ExitPolicy reject *:4661-4666 # eDonkey
ExitPolicy reject *:6346-6429 # Gnutella
ExitPolicy reject *:6881-6999 # BitTorrent
ExitPolicy accept *:*         # Allow everything else
