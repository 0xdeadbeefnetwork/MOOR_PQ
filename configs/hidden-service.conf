# MOOR Hidden Service Configuration
#
# Hosts a service reachable only through the MOOR network.
# Your .moor address is printed on first run and derived from your service key.
# Subsequent runs use the same key (stored in HiddenServiceDir).
#
# 1. Start your local service (web server, etc.) on the port below
# 2. Run: moor -f hidden-service.conf
# 3. Your .moor address is printed to the console
#
# Example:
#   python3 -m http.server 8080 &
#   moor -f hidden-service.conf
#   # Output: Hidden service address: abc123...xyz.moor

# ---- Core ----
Mode hs
DataDirectory /var/lib/moor
Verbose 1

# ---- Directory Authorities ----
DAAddress 107.174.70.38
DAPort 9030

# ---- Hidden Service ----
# Directory for HS keys (created on first run, reused after)
HiddenServiceDir /var/lib/moor/hidden_service

# Local port your service listens on (the HS forwards traffic here)
HiddenServicePort 8080

# ---- DoS Protection ----
# Require proof-of-work from clients before connecting (recommended for public services)
#HSPoW 0
#HSPoWDifficulty 16

# ---- Client Authorization ----
# Restrict who can connect. Only listed clients can even discover the service.
# Add one line per authorized client with their base32 Curve25519 public key.
#HiddenServiceAuthorizedClient base32pubkeyhere
#HiddenServiceAuthorizedClient anotherbase32pubkey

# Client-side onion auth credentials directory
#ClientOnionAuthDir /var/lib/moor/onion_auth

# ---- Privacy ----
# PIR for descriptor lookups (default: on)
PIR 1

# ---- Traffic Analysis Resistance ----
#PaddingMachine generic
#MixDelay 0

# ---- Monitoring ----
#ControlPort 9051
#ControlPortPassword mypassword

# ---- Enclave (independent network) ----
# Load DAs from enclave file instead of defaults
#Enclave /path/to/mynetwork.enclave

# ---- System ----
#Daemon 0
#PidFile /var/run/moor.pid

# GeoIP databases (for circuit path diversity)
#GeoIPFile /usr/share/moor/geoip
#GeoIPv6File /usr/share/moor/geoip6
